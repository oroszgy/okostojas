<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranglista - OkosTojás</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Ranglista 🏆</h1>
        </div>

        <!-- Filter Buttons (no aggregate tab) -->
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterLeaderboard('multiply', event)">✖️➗ Szorzás/Osztás</button>
            <button class="filter-btn" onclick="filterLeaderboard('add', event)">➕➖ Összeadás/Kivonás</button>
        </div>

        <!-- Player filter -->
        <div class="filter-players">
            <label for="playerFilter">👤 Játékos:</label>
            <select id="playerFilter" onchange="displayLeaderboard()">
                <option value="">Mindenki</option>
            </select>
        </div>

        <!-- Motivational personal-best banner -->
        <div id="personalBestBanner" class="personal-best-banner" style="display: none;"></div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>🏅</th>
                        <th>Név</th>
                        <th>Pontszám</th>
                        <th>Pontosság</th>
                        <th>Dátum</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="no-scores" id="noScores" style="display: none;">
            <p>Még nincsenek eredmények. Játssz egy játékot!</p>
        </div>

        <!-- Statistics Section -->
        <div class="stats-section">
            <h2>📊 Statisztikák</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Összes játék</div>
                    <div class="stat-value" id="totalGames">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Szorzás/Osztás legjobb</div>
                    <div class="stat-value" id="multiplyBest">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Összeadás/Kivonás legjobb</div>
                    <div class="stat-value" id="addBest">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Következő cím</div>
                    <div class="stat-value" id="nextTitle" style="font-size: 1em;">-</div>
                    <div class="level-progress-label" id="nextTitleLabel" style="display:none; margin-top:6px;"></div>
                    <div class="level-progress-bar-bg" id="nextTitleBarBg" style="display:none; margin-top:6px; max-width:100%;">
                        <div class="level-progress-bar-fill" id="nextTitleFill" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="goHome()">🏠 Vissza a Főmenübe</button>
            <button class="btn-secondary" onclick="window.location.href='tasks.html'">📈 Feladat Statisztikák</button>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script>
        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'girl';
        document.body.className = `theme-${savedTheme}`;

        let currentFilter = 'multiply';

        function filterLeaderboard(type, event) {
            currentFilter = type;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }

            displayLeaderboard();
        }

        function displayLeaderboard() {
            const scores = getLeaderboard();
            const tbody = document.getElementById('leaderboardBody');
            const noScores = document.getElementById('noScores');
            const banner = document.getElementById('personalBestBanner');

            const selectedPlayer = document.getElementById('playerFilter').value;
            const filteredScores = scores.filter(s =>
                s.gameType === currentFilter &&
                (selectedPlayer === '' || s.playerName === selectedPlayer)
            );

            if (filteredScores.length === 0) {
                tbody.innerHTML = '';
                noScores.style.display = 'block';
                banner.style.display = 'none';
                return;
            }

            noScores.style.display = 'none';

            // Personal best banner (built with DOM to avoid innerHTML injection)
            const personalBest = filteredScores[0].score;
            const typeName = currentFilter === 'multiply' ? 'Szorzás/Osztás' : 'Összeadás/Kivonás';
            banner.style.display = 'block';
            banner.textContent = '';
            const prefix = document.createElement('span');
            prefix.textContent = `🌟 Legjobb eredményed (${typeName}): `;
            const bold = document.createElement('strong');
            bold.textContent = `${personalBest} pont`;
            const suffix = document.createElement('span');
            suffix.textContent = ' — Le tudod dönteni?! 💪';
            banner.appendChild(prefix);
            banner.appendChild(bold);
            banner.appendChild(suffix);

            tbody.innerHTML = filteredScores.map((score, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : (index + 1);
                const date = new Date(score.date).toLocaleString('hu-HU');
                const isTopScore = index === 0;
                const rowClass = isTopScore ? 'top-score-row' : '';
                
                return `
                    <tr class="${rowClass}">
                        <td>${medal}</td>
                        <td>${score.playerName}${isTopScore ? ' ⭐' : ''}</td>
                        <td><strong>${score.score}</strong></td>
                        <td>${score.accuracy}%</td>
                        <td>${date}</td>
                    </tr>
                `;
            }).join('');
        }

        function displayStatistics() {
            const currentPlayer = localStorage.getItem('playerName') || 'Névtelen';
            const stats = getPlayerStats(currentPlayer);

            document.getElementById('totalGames').textContent = stats.totalGames;
            document.getElementById('multiplyBest').textContent = stats.multiply.bestScore;
            document.getElementById('addBest').textContent = stats.add.bestScore;

            // Next hero title progress using shared helper
            const progress = getProgressToNextTitle(stats.totalPoints);
            if (progress.nextTitle) {
                document.getElementById('nextTitle').textContent = progress.nextTitle;
                document.getElementById('nextTitleLabel').textContent =
                    `${progress.percent}% — még ${progress.needed.toLocaleString('hu-HU')} pont`;
            } else {
                document.getElementById('nextTitle').textContent = '🏆 Legmagasabb cím!';
                document.getElementById('nextTitleLabel').textContent = '100%';
            }
            document.getElementById('nextTitleFill').style.width = `${progress.percent}%`;
            document.getElementById('nextTitleLabel').style.display = '';
            document.getElementById('nextTitleBarBg').style.display = '';

            // Show whose stats are displayed
            const statsSection = document.querySelector('.stats-section h2');
            if (statsSection) {
                statsSection.textContent = `📊 ${currentPlayer} statisztikái`;
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Populate player filter dropdown
        function populatePlayerFilter() {
            const select = document.getElementById('playerFilter');
            const users = getAllUsers();
            users.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                select.appendChild(opt);
            });
        }

        // Initialize
        populatePlayerFilter();
        displayLeaderboard();
        displayStatistics();
    </script>
</body>
</html>
