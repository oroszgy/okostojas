<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranglista - Matek Játék</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Ranglista 🏆</h1>
        </div>

        <!-- Filter Buttons (no aggregate tab) -->
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterLeaderboard('multiply', event)">✖️➗ Szorzás/Osztás</button>
            <button class="filter-btn" onclick="filterLeaderboard('add', event)">➕➖ Összeadás/Kivonás</button>
        </div>

        <!-- Motivational personal-best banner -->
        <div id="personalBestBanner" class="personal-best-banner" style="display: none;"></div>

        <!-- Leaderboard Table -->
        <div class="leaderboard-container">
            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>🏅</th>
                        <th>Név</th>
                        <th>Pontszám</th>
                        <th>Pontosság</th>
                        <th>Dátum</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Will be populated by JavaScript -->
                </tbody>
            </table>
        </div>

        <div class="no-scores" id="noScores" style="display: none;">
            <p>Még nincsenek eredmények. Játssz egy játékot!</p>
        </div>

        <!-- Statistics Section -->
        <div class="stats-section">
            <h2>📊 Statisztikák</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Összes játék</div>
                    <div class="stat-value" id="totalGames">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Szorzás/Osztás legjobb</div>
                    <div class="stat-value" id="multiplyBest">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Összeadás/Kivonás legjobb</div>
                    <div class="stat-value" id="addBest">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Következő cím</div>
                    <div class="stat-value" id="nextTitle" style="font-size: 1em;">-</div>
                </div>
            </div>
        </div>

        <button class="btn-primary" onclick="goHome()">Vissza a Főmenübe</button>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script>
        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'girl';
        document.body.className = `theme-${savedTheme}`;

        let currentFilter = 'multiply';

        function filterLeaderboard(type, event) {
            currentFilter = type;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            if (event && event.target) {
                event.target.classList.add('active');
            }

            displayLeaderboard();
        }

        function displayLeaderboard() {
            const scores = getLeaderboard();
            const tbody = document.getElementById('leaderboardBody');
            const noScores = document.getElementById('noScores');
            const banner = document.getElementById('personalBestBanner');

            const filteredScores = scores.filter(s => s.gameType === currentFilter);

            if (filteredScores.length === 0) {
                tbody.innerHTML = '';
                noScores.style.display = 'block';
                banner.style.display = 'none';
                return;
            }

            noScores.style.display = 'none';

            // Personal best for current filter (top score in this category)
            const personalBest = filteredScores[0].score;
            const typeName = currentFilter === 'multiply' ? 'Szorzás/Osztás' : 'Összeadás/Kivonás';
            banner.style.display = 'block';
            banner.innerHTML = `🌟 Legjobb eredményed (${typeName}): <strong>${personalBest} pont</strong> — Le tudod dönteni?! 💪`;

            tbody.innerHTML = filteredScores.map((score, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : (index + 1);
                const date = new Date(score.date).toLocaleDateString('hu-HU');
                const isTopScore = index === 0;
                const rowClass = isTopScore ? 'top-score-row' : '';
                
                return `
                    <tr class="${rowClass}">
                        <td>${medal}</td>
                        <td>${score.playerName}${isTopScore ? ' ⭐' : ''}</td>
                        <td><strong>${score.score}</strong></td>
                        <td>${score.accuracy}%</td>
                        <td>${date}</td>
                    </tr>
                `;
            }).join('');
        }

        function displayStatistics() {
            const stats = getPlayerStats();
            
            document.getElementById('totalGames').textContent = stats.totalGames;
            document.getElementById('multiplyBest').textContent = stats.multiply.bestScore;
            document.getElementById('addBest').textContent = stats.add.bestScore;

            // Next hero title progress
            const currentPoints = stats.totalPoints;
            const currentTitle = getHeroTitle(currentPoints);
            let nextTitleText = '🏆 Legmagasabb cím!';
            for (let i = 0; i < HERO_TITLES.length; i++) {
                if (HERO_TITLES[i].points > currentPoints) {
                    const needed = HERO_TITLES[i].points - currentPoints;
                    nextTitleText = `${HERO_TITLES[i].title} (még ${needed} pont)`;
                    break;
                }
            }
            document.getElementById('nextTitle').textContent = nextTitleText;
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        // Initialize
        displayLeaderboard();
        displayStatistics();
    </script>
</body>
</html>
