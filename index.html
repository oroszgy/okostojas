<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkosTojás - Főmenü</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🥚 OkosTojás 🥚</h1>
            <div class="hero-title" id="heroTitle"></div>
        </div>

        <!-- User Selector -->
        <div class="user-selector">
            <label for="userSelect">👤 Játékos:</label>
            <div class="user-input-row">
                <select id="userSelect" class="config-select"></select>
            </div>
            <div class="new-player-row" id="newPlayerRow" style="display:none">
                <input type="text" id="newPlayerInput" class="config-select new-player-input"
                       placeholder="Írd be az új játékos nevét..." maxlength="30">
                <button type="button" class="btn-add-player" id="addPlayerBtn">✔ Hozzáad</button>
            </div>
        </div>

        <!-- Mascot character -->
        <div id="mascotWrapper" class="mascot-wrapper">
            <div id="mascot"></div>
            <div id="mascotRegressionMsg" class="mascot-regression-msg"></div>
        </div>

        <!-- Theme Selection -->
        <div class="theme-selector">
            <button class="theme-btn" data-theme="girl">👧 Lány Téma</button>
            <button class="theme-btn" data-theme="boy">👦 Fiú Téma</button>
        </div>

        <!-- Game Type Selection -->
        <div class="menu">
            <button class="game-btn" onclick="selectGame('multiply')">
                <span class="icon">✖️➗</span>
                <h2>Szorzás / Osztás</h2>
            </button>
            
            <button class="game-btn" onclick="selectGame('add')">
                <span class="icon">➕➖</span>
                <h2>Összeadás / Kivonás</h2>
            </button>

            <button class="game-btn boss-btn" onclick="openBossModal()">
                <span class="icon">⚔️</span>
                <h2>Főellenség Harc!</h2>
            </button>

            <button class="secondary-btn" onclick="showLeaderboard()">
                <span class="icon">🏆</span>
                Ranglista
            </button>

            <!-- Intenionally hidden so that kids won't find it automatically -->
<!--             <button class="secondary-btn" onclick="showTaskStats()"> -->
<!--                 <span class="icon">📈</span> -->
<!--                 Feladat Statisztikák -->
<!--             </button> -->
        </div>

        <!-- Configuration Modal (normal game) -->
        <div id="configModal" class="modal">
            <div class="modal-content">
                <h2 id="configTitle"></h2>

                <div class="config-group">
                    <label for="configValue" id="configLabel"></label>
                    <select id="configValue" class="config-select"></select>
                </div>

                <div class="config-group" id="lowerNumbersGroup" style="display:none">
                    <label class="checkbox-label">
                        <input type="checkbox" id="includeLowerNumbers">
                        Kisebb számok is (pl. 5-nél: 2, 3, 4, 5)
                    </label>
                </div>

                <div class="modal-buttons">
                    <button class="btn-primary" onclick="startGame()">Játék Indítása! 🚀</button>
                    <button class="btn-secondary" onclick="closeModal()">Mégse</button>
                </div>
            </div>
        </div>

        <!-- Boss Battle Modal -->
        <div id="bossModal" class="modal">
            <div class="modal-content">
                <h2>⚔️ Főellenség Harc!</h2>
                <p class="boss-modal-desc">Válaszd ki az ellenséget, majd számolj 10 hibátlan egymás utáni választ a legyőzéséhez!</p>

                <!-- Boss selection -->
                <div class="boss-selection" id="bossSelection"></div>

                <!-- Math type -->
                <div class="config-group">
                    <label for="bossGameType">Feladattípus:</label>
                    <select id="bossGameType" class="config-select" onchange="updateBossDifficultyOptions()">
                        <option value="multiply">Szorzás / Osztás</option>
                        <option value="add">Összeadás / Kivonás</option>
                    </select>
                </div>

                <!-- Difficulty -->
                <div class="config-group">
                    <label for="bossDifficulty" id="bossDifficultyLabel">Alapszám:</label>
                    <select id="bossDifficulty" class="config-select"></select>
                </div>

                <div class="config-group" id="bossLowerNumbersGroup" style="display:none">
                    <label class="checkbox-label">
                        <input type="checkbox" id="bossIncludeLower">
                        Kisebb számok is
                    </label>
                </div>

                <div class="modal-buttons">
                    <button class="btn-primary" onclick="startBossGame()">Harc! ⚔️</button>
                    <button class="btn-secondary" onclick="closeBossModal()">Mégse</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/mascot.js"></script>
    <script>
        // Initialize theme
        const savedTheme = localStorage.getItem('theme') || 'girl';
        document.body.className = `theme-${savedTheme}`;

        // Theme selection
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const theme = this.dataset.theme;
                localStorage.setItem('theme', theme);
                document.body.className = `theme-${theme}`;
            });
        });

        // Populate the user dropdown from stored task stats
        const NEW_PLAYER_VALUE = '__new__';

        function populateUserSelect() {
            const select = document.getElementById('userSelect');
            const savedName = localStorage.getItem('playerName') || '';
            const users = getAllUsers();

            // Include the saved player name even if they haven't played a game yet
            const allUsers = (savedName && !users.includes(savedName))
                ? [...users, savedName].sort((a, b) => a.localeCompare(b))
                : users;

            select.innerHTML = '';
            allUsers.forEach(user => {
                const opt = document.createElement('option');
                opt.value = user;
                opt.textContent = user;
                select.appendChild(opt);
            });

            // Extra row for a new player
            const newOpt = document.createElement('option');
            newOpt.value = NEW_PLAYER_VALUE;
            newOpt.textContent = '✚ Új játékos...';
            select.appendChild(newOpt);

            // Pre-select current player or fall back to new-player row
            if (savedName && allUsers.includes(savedName)) {
                select.value = savedName;
            } else {
                select.value = NEW_PLAYER_VALUE;
            }
            updateNewPlayerInputVisibility();
        }

        function updateNewPlayerInputVisibility() {
            const select = document.getElementById('userSelect');
            const newPlayerRow = document.getElementById('newPlayerRow');
            const newPlayerInput = document.getElementById('newPlayerInput');
            if (select.value === NEW_PLAYER_VALUE) {
                newPlayerRow.style.display = '';
                newPlayerInput.focus();
            } else {
                newPlayerRow.style.display = 'none';
                newPlayerInput.value = '';
            }
        }

        // Return the currently selected player name
        function getCurrentPlayerName() {
            const select = document.getElementById('userSelect');
            if (select && select.value !== NEW_PLAYER_VALUE) {
                return select.value || 'Névtelen';
            }
            return 'Névtelen';
        }

        // Add the new player from the input field and select them
        function addNewPlayer() {
            const input = document.getElementById('newPlayerInput');
            const name = (input.value || '').trim();
            if (!name) {
                input.focus();
                return;
            }
            localStorage.setItem('playerName', name);
            populateUserSelect();
            updatePlayerDisplay(name);
        }

        // Update the hero title, mascot and regression message for the given player
        function updatePlayerDisplay(playerName) {
            const name = (playerName && playerName.trim()) || 'Névtelen';

            const stats = getPlayerStats(name);
            const title = getHeroTitle(stats.totalPoints);
            document.getElementById('heroTitle').textContent = title ? `⭐ ${title} ⭐` : '';

            const tier = getMascotTier(stats.totalPoints, name);
            renderMascot('mascot', tier);

            const regressionMsg = getMascotRegressionMessage(name);
            document.getElementById('mascotRegressionMsg').textContent = regressionMsg || '';
        }

        // Initialise user selector
        populateUserSelect();
        updatePlayerDisplay(getCurrentPlayerName());

        document.getElementById('userSelect').addEventListener('change', function() {
            updateNewPlayerInputVisibility();
            if (this.value !== NEW_PLAYER_VALUE) {
                localStorage.setItem('playerName', this.value);
                updatePlayerDisplay(this.value);
            }
        });

        document.getElementById('addPlayerBtn').addEventListener('click', addNewPlayer);

        document.getElementById('newPlayerInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') addNewPlayer();
        });

        function selectGame(gameType) {
            const modal = document.getElementById('configModal');
            const configValue = document.getElementById('configValue');
            const configLabel = document.getElementById('configLabel');
            const configTitle = document.getElementById('configTitle');

            // Clear previous options
            configValue.innerHTML = '';

            if (gameType === 'multiply') {
                configTitle.textContent = 'Szorzás / Osztás Beállítás';
                configLabel.textContent = 'Válassz alapszámot:';
                for (let i = 2; i <= 10; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `${i}-es szorzótábla`;
                    configValue.appendChild(option);
                }
                document.getElementById('lowerNumbersGroup').style.display = '';
                document.getElementById('includeLowerNumbers').checked = false;
            } else {
                document.getElementById('lowerNumbersGroup').style.display = 'none';
                configTitle.textContent = 'Összeadás / Kivonás Beállítás';
                configLabel.textContent = 'Válassz felső határt:';
                [10, 20, 50, 100].forEach(num => {
                    const option = document.createElement('option');
                    option.value = num;
                    option.textContent = `Számok 0-${num} között`;
                    configValue.appendChild(option);
                });
            }

            // Store game type for later
            modal.dataset.gameType = gameType;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('configModal').style.display = 'none';
        }

        function startGame() {
            const modal = document.getElementById('configModal');
            const gameType = modal.dataset.gameType;
            const configValue = document.getElementById('configValue').value;
            const includeLowerNumbers = gameType === 'multiply' && document.getElementById('includeLowerNumbers').checked;
            const playerName = getCurrentPlayerName();

            // Persist player name and refresh selector
            localStorage.setItem('playerName', playerName);
            populateUserSelect();

            // Store configuration and navigate to game
            localStorage.setItem('currentGame', JSON.stringify({
                type: gameType,
                config: parseInt(configValue),
                numQuestions: 20,
                includeLowerNumbers: includeLowerNumbers,
                playerName: playerName
            }));

            window.location.href = 'game.html';
        }

        // Boss modal helpers
        let selectedBossId = BOSS_ENEMIES[0].id;

        function openBossModal() {
            // Build boss selection cards
            const container = document.getElementById('bossSelection');
            container.innerHTML = '';
            BOSS_ENEMIES.forEach(boss => {
                const card = document.createElement('button');
                card.type = 'button';
                card.className = 'boss-card' + (boss.id === selectedBossId ? ' selected' : '');
                card.dataset.bossId = boss.id;
                card.setAttribute('aria-pressed', boss.id === selectedBossId ? 'true' : 'false');
                card.innerHTML = `<span class="boss-card-emoji">${boss.emoji}</span><span class="boss-card-name">${boss.name}</span>`;
                card.addEventListener('click', () => {
                    selectedBossId = boss.id;
                    container.querySelectorAll('.boss-card').forEach(c => {
                        c.classList.remove('selected');
                        c.setAttribute('aria-pressed', 'false');
                    });
                    card.classList.add('selected');
                    card.setAttribute('aria-pressed', 'true');
                });
                container.appendChild(card);
            });

            // Populate difficulty options
            updateBossDifficultyOptions();

            document.getElementById('bossModal').style.display = 'flex';
        }

        function closeBossModal() {
            document.getElementById('bossModal').style.display = 'none';
        }

        function updateBossDifficultyOptions() {
            const gameType = document.getElementById('bossGameType').value;
            const diffSelect = document.getElementById('bossDifficulty');
            const label = document.getElementById('bossDifficultyLabel');
            const lowerGroup = document.getElementById('bossLowerNumbersGroup');

            diffSelect.innerHTML = '';
            if (gameType === 'multiply') {
                label.textContent = 'Alapszám:';
                for (let i = 2; i <= 10; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = `${i}-es szorzótábla`;
                    diffSelect.appendChild(opt);
                }
                lowerGroup.style.display = '';
            } else {
                label.textContent = 'Felső határ:';
                [10, 20, 50, 100].forEach(num => {
                    const opt = document.createElement('option');
                    opt.value = num;
                    opt.textContent = `Számok 0-${num} között`;
                    diffSelect.appendChild(opt);
                });
                lowerGroup.style.display = 'none';
            }
        }

        function startBossGame() {
            const gameType = document.getElementById('bossGameType').value;
            const config = parseInt(document.getElementById('bossDifficulty').value);
            const includeLower = gameType === 'multiply' && document.getElementById('bossIncludeLower').checked;
            const playerName = localStorage.getItem('playerName') || 'Névtelen';

            localStorage.setItem('currentGame', JSON.stringify({
                type: gameType,
                config: config,
                numQuestions: 20,
                includeLowerNumbers: includeLower,
                mode: 'boss',
                bossId: selectedBossId,
                playerName: playerName
            }));

            window.location.href = 'game.html';
        }

        function showLeaderboard() {
            window.location.href = 'leaderboard.html';
        }

        function showTaskStats() {
            window.location.href = 'tasks.html';
        }
    </script>
</body>
</html>
