<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OkosTojás</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container game-container">
        <!-- Game Header -->
        <div class="game-header">
            <div class="progress" id="progressDisplay">
                <span id="questionNumber">1</span> / <span id="totalQuestions">20</span>
            </div>
            <div class="score">
                Pontok: <span id="score">0</span>
            </div>
        </div>

        <!-- Boss Battle Section (hidden in normal mode) -->
        <div class="boss-section" id="bossSection" style="display:none">
            <div class="boss-display">
                <span class="boss-emoji" id="bossEmoji">🦒</span>
                <span class="boss-name" id="bossName">Zavaros Zsiráf</span>
            </div>
            <div class="boss-hp-hearts" id="bossHpHearts">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div>
            <div class="boss-streak" id="bossStreak">0/10 egymás utáni helyes</div>
        </div>

        <!-- Question Display -->
        <div class="question-container">
            <div class="question" id="question">
                <span id="num1">5</span>
                <span id="operator">×</span>
                <span id="num2">3</span>
                <span>=</span>
                <span>?</span>
            </div>

            <div class="timer">
                ⏱️ <span id="timer">0.0</span>s
            </div>
        </div>

        <!-- Answer Input -->
        <div class="answer-container">
            <input type="number" id="answer" class="answer-input">
            <button class="btn-primary" onclick="submitAnswer()">Válasz! ✓</button>
        </div>

        <!-- Numpad Toggle -->
        <div class="numpad-toggle-row">
            <button type="button" class="numpad-toggle-btn" id="numpadToggle" onclick="toggleNumpad()">🔢 Számbillentyűzet</button>
        </div>

        <!-- Numeric Keypad -->
        <div id="numpad" class="numpad">
            <div class="numpad-grid">
                <button type="button" class="numpad-btn" onclick="numpadPress(7)">7</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(8)">8</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(9)">9</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(4)">4</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(5)">5</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(6)">6</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(1)">1</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(2)">2</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(3)">3</button>
                <button type="button" class="numpad-btn numpad-btn-backspace" onclick="numpadBackspace()">⌫</button>
                <button type="button" class="numpad-btn" onclick="numpadPress(0)">0</button>
                <button type="button" class="numpad-btn numpad-btn-submit" onclick="submitAnswer()">✓</button>
            </div>
        </div>

        <!-- Feedback -->
        <div id="feedback" class="feedback"></div>

        <!-- Result Modal -->
        <div id="resultModal" class="modal">
            <div class="modal-content result-content">
                <h2>🎉 Játék Vége! 🎉</h2>

                <!-- Boss battle result banner -->
                <div id="bossBanner" class="boss-banner" style="display:none"></div>
                
                <div class="result-stats">
                    <div class="stat">
                        <div class="stat-label">Összes pont</div>
                        <div class="stat-value" id="finalScore">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Helyes válaszok</div>
                        <div class="stat-value" id="correctAnswers">0</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Pontosság</div>
                        <div class="stat-value" id="accuracy">0%</div>
                    </div>
                </div>

                <div id="newHeroTitle" class="new-hero-title"></div>

                <div id="resultLevelProgress" class="result-level-progress" style="display:none">
                    <div class="result-total-points" id="resultTotalPoints"></div>
                    <div class="level-progress-label" id="resultProgressLabel"></div>
                    <div class="level-progress-bar-bg">
                        <div class="level-progress-bar-fill" id="resultProgressFill" style="width:0%"></div>
                    </div>
                    <div class="level-progress-text" id="resultProgressText"></div>
                </div>

                <div class="config-group">
                    <label for="playerName">Add meg a neved:</label>
                    <input type="text" id="playerName" class="answer-input" placeholder="Neved">
                </div>

                <div class="modal-buttons">
                    <button class="btn-primary" onclick="saveAndReturn()">Mentés és Főmenü</button>
                    <button class="btn-secondary" onclick="playAgain()">Új Játék</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="correctSound"></audio>
    <audio id="wrongSound"></audio>

    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/mascot.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
